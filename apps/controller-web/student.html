<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Student Portal — LyHuor Learning</title>
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="./icon-32.png">
  <link rel="apple-touch-icon" href="./icon-180.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#08111d">
  <meta name="apple-mobile-web-app-title" content="Student Portal">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root {
      --bg: #07101c; --panel: #112033; --panel2: #1b3151; --ink: #f6f8fb;
      --muted: #9fb2c9; --accent: #ffd34f; --accent2: #69e6a6; --line: rgba(255,255,255,0.1);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; min-height: 100vh; color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 20% 0%, rgba(246,196,95,0.18), transparent 28%), linear-gradient(160deg, #07101c, #0f2238 48%, #07111c);
    }
    main { width: min(100%, 560px); margin: 0 auto; padding: 22px 16px 40px; }
    h1 { font-size: 28px; margin: 0 0 4px; }
    .muted { color: var(--muted); line-height: 1.5; }
    .panel { background: linear-gradient(180deg, rgba(17,31,52,0.98), rgba(10,18,30,0.96)); border: 1px solid var(--line); border-radius: 20px; padding: 18px; margin-top: 16px; }
    label { display: block; font-size: 13px; font-weight: 700; color: var(--muted); margin: 12px 0 6px; }
    input { width: 100%; border: 0; outline: none; border-radius: 14px; padding: 14px; background: var(--panel2); color: var(--ink); font-size: 16px; }
    button { border: 0; border-radius: 14px; padding: 14px 18px; font-size: 16px; font-weight: 800; color: #08111d; background: var(--accent); cursor: pointer; }
    button.secondary { background: #304c72; color: #fff; }
    button:disabled { opacity: 0.5; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .tabs { display: flex; gap: 8px; margin-bottom: 6px; }
    .tab { flex: 1; background: var(--panel2); color: var(--ink); }
    .tab.active { background: var(--accent); color: #08111d; }
    .status { margin-top: 10px; font-size: 14px; min-height: 18px; }
    .assignment { border: 1px solid var(--line); border-radius: 16px; padding: 14px; margin-top: 12px; background: rgba(255,255,255,0.04); }
    .assignment h3 { margin: 0 0 4px; font-size: 17px; }
    .assignment .meta { color: var(--muted); font-size: 13px; margin-bottom: 10px; }
    .pill { display: inline-block; font-size: 12px; font-weight: 800; padding: 3px 10px; border-radius: 999px; }
    .pill.done { background: rgba(105,230,166,0.18); color: var(--accent2); }
    .pill.todo { background: rgba(255,211,79,0.16); color: var(--accent); }
    .hidden { display: none; }
    .topbar { display: flex; justify-content: space-between; align-items: center; }
    .progress-title { font-weight: 800; color: var(--accent); margin: 4px 0 10px; }
    .mastery-card { border: 1px solid var(--line); border-radius: 16px; padding: 14px; margin-top: 12px; background: rgba(255,255,255,0.04); }
    .mastery-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .mastery-subject { font-weight: 800; font-size: 16px; }
    .mastery-badge { display: inline-flex; align-items: center; gap: 6px; font-weight: 800; font-size: 14px; white-space: nowrap; }
    .mastery-badge .ico { font-size: 22px; }
    .mastery-meta { margin-top: 6px; font-size: 13px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .trend-up { color: var(--accent2); font-weight: 800; }
    .trend-down { color: #ff9b7d; font-weight: 800; }
    .trend-steady { color: var(--muted); font-weight: 700; }
    .mastery-bar { margin-top: 9px; height: 8px; border-radius: 6px; background: rgba(255,255,255,0.10); overflow: hidden; }
    .mastery-bar > span { display: block; height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--accent2), var(--accent)); }
    .mastery-next { margin-top: 6px; font-size: 12px; color: var(--muted); }
    .mastery-maxed { margin-top: 6px; font-size: 12px; color: var(--accent2); font-weight: 700; }
    .engage { display: flex; gap: 10px; flex-wrap: wrap; }
    .engage .stat { flex: 1; min-width: 92px; text-align: center; border: 1px solid var(--line); border-radius: 14px; padding: 12px 8px; background: rgba(255,255,255,0.04); }
    .engage .big { font-size: 22px; font-weight: 800; }
    .engage .lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .engage .streak .big { color: #ff9b57; }
    .engage .xp .big { color: var(--accent); }
    .engage .goal .big { color: var(--accent2); }
    .goalbar { margin-top: 6px; height: 6px; border-radius: 5px; background: rgba(255,255,255,0.12); overflow: hidden; }
    .goalbar > span { display: block; height: 100%; background: var(--accent2); }
    .mistake-card { border: 1px solid var(--line); border-radius: 14px; padding: 12px 14px; margin-top: 10px; background: rgba(152,68,80,0.10); }
    .mistake-card .q { font-weight: 700; }
    .mistake-card .ans { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .mistake-card .ok { color: var(--accent2); font-weight: 700; }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <div>
        <h1>📚 Student Portal</h1>
        <p class="muted" id="subtitle">Sign in to see the quizzes your teacher assigned.</p>
      </div>
      <button id="logoutBtn" class="secondary hidden" style="padding:10px 14px;">Log out</button>
    </div>

    <section id="authPanel" class="panel">
      <div class="tabs">
        <button class="tab active" id="tabLogin">Log in</button>
        <button class="tab" id="tabRegister">Create account</button>
      </div>

      <div id="loginForm">
        <label>Username<input id="loginUser" autocomplete="username" autocapitalize="none"></label>
        <label>Password<input id="loginPass" type="password" autocomplete="current-password"></label>
        <div class="row" style="margin-top:14px;"><button id="loginBtn">Log in</button></div>
      </div>

      <div id="registerForm" class="hidden">
        <label>Your name<input id="regName" placeholder="e.g. Dara" autocomplete="name"></label>
        <label>Username<input id="regUser" autocomplete="username" autocapitalize="none"></label>
        <label>Password (min 6)<input id="regPass" type="password" autocomplete="new-password"></label>
        <label>Class code (optional)<input id="regCode" placeholder="e.g. ABC123" autocapitalize="characters"></label>
        <div class="row" style="margin-top:14px;"><button id="registerBtn">Create account</button></div>
      </div>
      <div class="status" id="authStatus"></div>
    </section>

    <section id="appPanel" class="panel hidden">
      <div class="row" style="justify-content:space-between;">
        <strong id="welcome"></strong>
      </div>
      <label>Join a class with a code</label>
      <div class="row">
        <input id="joinCode" placeholder="Class code" autocapitalize="characters" style="flex:1;">
        <button id="joinBtn" class="secondary">Join</button>
      </div>
      <div class="status" id="appStatus"></div>

      <h2 style="font-size:18px; margin:18px 0 6px;">Tasks from your parent</h2>
      <div id="tasks"></div>

      <h2 style="font-size:18px; margin:22px 0 6px;">My progress</h2>
      <div id="engagement"></div>
      <div class="row" id="practiceRow" style="margin:10px 0 4px;"></div>
      <div id="progress"></div>

      <h2 style="font-size:18px; margin:22px 0 6px;">Review your mistakes</h2>
      <div class="row"><button id="mistakesBtn" class="secondary">Show my recent mistakes</button></div>
      <div id="mistakes" style="margin-top:6px;"></div>

      <h2 style="font-size:18px; margin:22px 0 0;">Your quizzes</h2>
      <div id="assignments"></div>

      <h2 style="font-size:18px; margin:22px 0 6px;">Link a parent</h2>
      <p class="muted" style="font-size:13px; margin:0 0 8px;">Generate a code and share it with your parent so they can follow your progress and set you tasks. The code lasts 24 hours.</p>
      <div class="row">
        <button id="linkCodeBtn" class="secondary">Generate link code</button>
        <span id="linkCodeBox" style="font-weight:800; font-size:20px; letter-spacing:3px; color:var(--accent);"></span>
      </div>
      <div class="status" id="linkStatus"></div>
    </section>
  </main>

  <script src="./config.js"></script>
  <script src="./support-widget.js"></script>
  <script>
    const config = window.FRUIT_CATCHER_CONFIG || {};
    const gatewayUrl = config.gatewayHttpUrl || "http://localhost:3000";
    const TOKEN_KEY = "fruitcatcher_student_token";
    const NAME_KEY = "fruitcatcher_student_name";

    const $ = (id) => document.getElementById(id);
    function token() { try { return localStorage.getItem(TOKEN_KEY) || ""; } catch (e) { return ""; } }
    function setStatus(el, msg, color) { el.textContent = msg || ""; el.style.color = color || "var(--muted)"; }

    async function apiPost(path, body, auth) {
      const headers = { "Content-Type": "application/json" };
      if (auth) headers["Authorization"] = "Bearer " + token();
      const res = await fetch(gatewayUrl + path, { method: "POST", headers, body: JSON.stringify(body || {}) });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Request failed");
      return data;
    }
    async function apiGet(path) {
      const res = await fetch(gatewayUrl + path, { headers: { "Authorization": "Bearer " + token() } });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Request failed");
      return data;
    }

    function showAuthed(name) {
      $("authPanel").classList.add("hidden");
      $("appPanel").classList.remove("hidden");
      $("logoutBtn").classList.remove("hidden");
      $("subtitle").textContent = "Tap a quiz to start. Your scores go to your teacher.";
      $("welcome").textContent = "Hi, " + (name || "student") + " 👋";
      loadTasks();
      loadAssignments();
      loadProgress();
    }
    function showSignedOut() {
      $("appPanel").classList.add("hidden");
      $("authPanel").classList.remove("hidden");
      $("logoutBtn").classList.add("hidden");
    }

    $("tabLogin").addEventListener("click", () => {
      $("tabLogin").classList.add("active"); $("tabRegister").classList.remove("active");
      $("loginForm").classList.remove("hidden"); $("registerForm").classList.add("hidden");
    });
    $("tabRegister").addEventListener("click", () => {
      $("tabRegister").classList.add("active"); $("tabLogin").classList.remove("active");
      $("registerForm").classList.remove("hidden"); $("loginForm").classList.add("hidden");
    });

    $("loginBtn").addEventListener("click", async () => {
      try {
        setStatus($("authStatus"), "Signing in…", "var(--accent)");
        const data = await apiPost("/student/login", { username: $("loginUser").value.trim(), password: $("loginPass").value });
        localStorage.setItem(TOKEN_KEY, data.token);
        localStorage.setItem(NAME_KEY, data.student.displayName);
        setStatus($("authStatus"), "");
        showAuthed(data.student.displayName);
      } catch (e) { setStatus($("authStatus"), e.message, "#ff9b7d"); }
    });

    $("registerBtn").addEventListener("click", async () => {
      try {
        setStatus($("authStatus"), "Creating account…", "var(--accent)");
        const data = await apiPost("/student/register", {
          username: $("regUser").value.trim(), password: $("regPass").value,
          displayName: $("regName").value.trim(), joinCode: $("regCode").value.trim()
        });
        localStorage.setItem(TOKEN_KEY, data.token);
        localStorage.setItem(NAME_KEY, data.student.displayName);
        setStatus($("authStatus"), "");
        showAuthed(data.student.displayName);
      } catch (e) { setStatus($("authStatus"), e.message, "#ff9b7d"); }
    });

    $("joinBtn").addEventListener("click", async () => {
      const code = $("joinCode").value.trim();
      if (!code) return;
      try {
        setStatus($("appStatus"), "Joining…", "var(--accent)");
        const data = await apiPost("/student/join", { joinCode: code }, true);
        $("joinCode").value = "";
        setStatus($("appStatus"), "Joined " + data.classroom.name + " ✓", "var(--accent2)");
        loadAssignments();
      } catch (e) { setStatus($("appStatus"), e.message, "#ff9b7d"); }
    });

    $("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(NAME_KEY);
      showSignedOut();
    });

    $("linkCodeBtn").addEventListener("click", async () => {
      try {
        setStatus($("linkStatus"), "Generating…", "var(--accent)");
        const data = await apiPost("/student/link-code", {}, true);
        $("linkCodeBox").textContent = data.code;
        setStatus($("linkStatus"), "Share this code with your parent — it expires in 24 hours.", "var(--accent2)");
      } catch (e) {
        if (/sign in/i.test(e.message)) { localStorage.removeItem(TOKEN_KEY); showSignedOut(); return; }
        setStatus($("linkStatus"), e.message, "#ff9b7d");
      }
    });

    function taskQuizUrl(t) {
      const p = new URLSearchParams({
        mode: "solo", source: "parent_task", parentTaskId: t.id,
        curriculum: t.curriculum || "cambodia_moeys", language: t.language || "khmer",
        subject: t.subject || "math", grade: String(t.gradeLevel || 6),
        count: String(t.questionsPerRound || 5), name: localStorage.getItem(NAME_KEY) || ""
      });
      return "/?" + p.toString();
    }

    async function loadTasks() {
      const host = $("tasks");
      host.innerHTML = "<p class='muted'>Loading…</p>";
      try {
        const data = await apiGet("/student/tasks");
        const tasks = data.tasks || [];
        if (!tasks.length) { host.innerHTML = "<p class='muted'>No tasks yet. Link a parent below and they can set you tasks.</p>"; return; }
        host.innerHTML = "";
        tasks.forEach((t) => {
          const done = t.status === "done";
          const meta = t.kind === "quiz"
            ? `${escapeHtml(labelSubject(t.subject))} · Grade ${t.gradeLevel} · ${t.questionsPerRound} questions`
            : "To-do";
          const due = t.dueAt ? ` · due ${new Date(t.dueAt).toLocaleDateString()}` : "";
          const pill = done
            ? `<span class="pill done">Done${(t.kind === "quiz" && t.score != null) ? " · " + t.score + "/" + t.total : ""}</span>`
            : `<span class="pill todo">To do</span>`;
          let actionHtml = "";
          if (!done && t.kind === "quiz") actionHtml = `<button data-quiz="${escapeHtml(taskQuizUrl(t))}">Start</button>`;
          else if (!done && t.kind === "todo") actionHtml = `<button data-done="${escapeHtml(t.id)}">Mark done</button>`;
          const card = document.createElement("div");
          card.className = "assignment";
          card.innerHTML = `
            <h3>${escapeHtml(t.title)}</h3>
            <div class="meta">From ${escapeHtml(t.parentName || "your parent")} · ${meta}${due}</div>
            ${t.note ? `<p class="muted" style="margin:0 0 10px;">${escapeHtml(t.note)}</p>` : ""}
            <div class="row" style="justify-content:space-between;">${pill}${actionHtml}</div>`;
          const qbtn = card.querySelector("button[data-quiz]");
          if (qbtn) qbtn.addEventListener("click", () => { window.location.href = qbtn.getAttribute("data-quiz"); });
          const dbtn = card.querySelector("button[data-done]");
          if (dbtn) dbtn.addEventListener("click", async () => {
            dbtn.disabled = true;
            try { await apiPost("/student/tasks/" + encodeURIComponent(dbtn.getAttribute("data-done")) + "/complete", {}, true); loadTasks(); }
            catch (e) { dbtn.disabled = false; }
          });
          host.appendChild(card);
        });
      } catch (e) {
        if (/sign in/i.test(e.message)) { localStorage.removeItem(TOKEN_KEY); showSignedOut(); return; }
        host.innerHTML = `<p class='muted' style='color:#ff9b7d;'>${escapeHtml(e.message)}</p>`;
      }
    }

    async function loadAssignments() {
      const host = $("assignments");
      host.innerHTML = "<p class='muted'>Loading…</p>";
      try {
        const data = await apiGet("/student/assignments");
        if (!data.assignments.length) {
          host.innerHTML = "<p class='muted'>No quizzes yet. Join a class with the code from your teacher.</p>";
          return;
        }
        host.innerHTML = "";
        data.assignments.forEach((a) => {
          const card = document.createElement("div");
          card.className = "assignment";
          const status = a.completed
            ? `<span class="pill done">Done · ${a.score}/${a.total}</span>`
            : `<span class="pill todo">Not done</span>`;
          card.innerHTML = `
            <h3>${escapeHtml(a.title)}</h3>
            <div class="meta">${escapeHtml(a.classroomName)} · ${escapeHtml(labelSubject(a.subject))} · Grade ${a.gradeLevel} · ${a.questionsPerRound} questions</div>
            <div class="row" style="justify-content:space-between;">
              ${status}
              <button data-link="${encodeURIComponent(a.link)}">${a.completed ? "Retake" : "Start"}</button>
            </div>`;
          card.querySelector("button").addEventListener("click", (ev) => {
            window.location.href = decodeURIComponent(ev.currentTarget.getAttribute("data-link"));
          });
          host.appendChild(card);
        });
      } catch (e) {
        if (/sign in/i.test(e.message)) { localStorage.removeItem(TOKEN_KEY); showSignedOut(); return; }
        host.innerHTML = `<p class='muted' style='color:#ff9b7d;'>${escapeHtml(e.message)}</p>`;
      }
    }

    function escapeHtml(v) { return String(v == null ? "" : v).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
    function labelSubject(s) { return String(s || "").replace(/_/g, " ").replace(/\b\w/g, (c) => c.toUpperCase()); }

    function masteryCardHTML(s) {
      const m = s.mastery || {};
      const trend = s.trend === "up"
        ? '<span class="trend-up">▲ improving</span>'
        : s.trend === "down"
          ? '<span class="trend-down">▼ keep practising</span>'
          : s.trend === "steady"
            ? '<span class="trend-steady">→ steady</span>'
            : "";
      const nextLine = m.isMax
        ? '<div class="mastery-maxed">🏆 Top level reached — keep it up!</div>'
        : (m.next
            ? `<div class="mastery-bar"><span style="width:${Math.max(4, Number(m.progressPct) || 0)}%"></span></div>`
              + `<div class="mastery-next">${Number(m.progressPct) || 0}% to ${escapeHtml(m.next.badge)} ${escapeHtml(m.next.name)} `
              + `(needs ${m.next.minQuestions}+ questions at ${m.next.minAccuracy}%+)</div>`
            : "");
      return `<div class="mastery-card">`
        + `<div class="mastery-top">`
        + `<span class="mastery-subject">${escapeHtml(s.subjectLabel || s.subject)}</span>`
        + `<span class="mastery-badge"><span class="ico">${escapeHtml(m.badge || "🌱")}</span>${escapeHtml(m.name || "Starter")}</span>`
        + `</div>`
        + `<div class="mastery-meta"><span><b>${s.accuracy || 0}%</b> accuracy</span><span>${s.questions || 0} questions</span>${trend}</div>`
        + nextLine
        + `</div>`;
    }

    function engagementHTML(e) {
      if (!e) return "";
      const pct = Math.min(100, Math.round((e.today.questions / Math.max(1, e.today.goal)) * 100));
      return `<div class="engage">
        <div class="stat streak"><div class="big">🔥 ${e.streakDays}</div><div class="lbl">day streak</div></div>
        <div class="stat xp"><div class="big">⭐ ${e.level}</div><div class="lbl">Level · ${e.xpTotal} XP</div></div>
        <div class="stat goal"><div class="big">${e.today.questions}/${e.today.goal}</div><div class="lbl">${e.today.goalMet ? "goal done! ✅" : "today's goal"}</div>
          <div class="goalbar"><span style="width:${pct}%"></span></div></div>
      </div>`;
    }

    // Pick the lowest-accuracy subject with enough practice to be meaningful.
    function weakestSubject(subjects) {
      const eligible = (subjects || []).filter((s) => (s.questions || 0) >= 3);
      if (!eligible.length) return null;
      return eligible.slice().sort((a, b) => (a.accuracy || 0) - (b.accuracy || 0))[0];
    }

    function practiceUrl(s) {
      const p = new URLSearchParams({
        mode: "solo", source: "smart_practice",
        curriculum: "cambodia_moeys", language: "khmer",
        subject: s.subject, grade: "6", count: "10", name: localStorage.getItem(NAME_KEY) || ""
      });
      return "/?" + p.toString();
    }

    async function loadProgress() {
      const host = $("progress");
      host.innerHTML = "<p class='muted'>Loading your progress…</p>";
      $("engagement").innerHTML = "";
      $("practiceRow").innerHTML = "";
      try {
        const data = await apiGet("/student/progress");
        const subjects = data.subjects || [];
        $("engagement").innerHTML = engagementHTML(data.engagement);
        const weak = weakestSubject(subjects);
        if (weak) {
          const btn = document.createElement("button");
          btn.textContent = "🎯 Practise your weakest: " + escapeHtml(weak.subjectLabel || weak.subject) + " (" + (weak.accuracy || 0) + "%)";
          btn.addEventListener("click", () => { window.location.href = practiceUrl(weak); });
          $("practiceRow").appendChild(btn);
        }
        if (!subjects.length) {
          host.innerHTML = "<p class='muted'>No progress yet — take a quiz to start growing your subject mastery. 🌱</p>";
          return;
        }
        host.innerHTML = subjects.map(masteryCardHTML).join("");
      } catch (e) {
        if (/sign in/i.test(e.message)) { localStorage.removeItem(TOKEN_KEY); showSignedOut(); return; }
        host.innerHTML = `<p class='muted' style='color:#ff9b7d;'>${escapeHtml(e.message)}</p>`;
      }
    }

    $("mistakesBtn").addEventListener("click", loadMistakes);
    async function loadMistakes() {
      const host = $("mistakes");
      host.innerHTML = "<p class='muted'>Loading…</p>";
      try {
        const data = await apiGet("/student/mistakes");
        const items = data.mistakes || [];
        if (!items.length) { host.innerHTML = "<p class='muted'>No mistakes to review — great job! 🎉</p>"; return; }
        host.innerHTML = items.map((m) => {
          const correct = (m.choices || []).find((c) => c.id === m.correctChoice);
          return `<div class="mistake-card">
            <div class="q">${escapeHtml(m.prompt)}</div>
            <div class="ans">Your answer: ${escapeHtml(m.yourChoice || "—")} · Correct: <span class="ok">${escapeHtml(m.correctChoice)}${correct ? " · " + escapeHtml(correct.text) : ""}</span></div>
            ${m.shortExplanation ? `<div class="ans">${escapeHtml(m.shortExplanation)}</div>` : ""}
          </div>`;
        }).join("");
      } catch (e) {
        if (/sign in/i.test(e.message)) { localStorage.removeItem(TOKEN_KEY); showSignedOut(); return; }
        host.innerHTML = `<p class='muted' style='color:#ff9b7d;'>${escapeHtml(e.message)}</p>`;
      }
    }

    // Boot
    if (token()) {
      showAuthed(localStorage.getItem(NAME_KEY) || "student");
    } else {
      showSignedOut();
    }
  </script>
</body>
</html>
