<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LyHuor Learning Controller</title>
  <style>
    :root {
      --bg: #0c1320;
      --panel: #111f34;
      --panel-2: #1b3151;
      --ink: #f6f8fb;
      --muted: #9fb2c9;
      --accent: #ffd34f;
      --accent-2: #69e6a6;
      --danger: #ff7272;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top, rgba(105, 230, 166, 0.12), transparent 30%),
        linear-gradient(180deg, #101b2c 0%, #08111d 100%);
    }

    main {
      width: min(100%, 540px);
      margin: 0 auto;
      padding: 22px 16px 36px;
    }

    .panel {
      background: linear-gradient(180deg, rgba(17, 31, 52, 0.98), rgba(10, 18, 30, 0.96));
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
    }

    h1, h2, p {
      margin: 0;
    }

    h1 {
      font-size: 34px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .lead, .status {
      color: var(--muted);
      line-height: 1.5;
    }

    .room-form {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      margin-top: 16px;
    }

    input, select {
      width: 100%;
      border: 0;
      outline: none;
      border-radius: 16px;
      padding: 16px;
      background: var(--panel-2);
      color: var(--ink);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    select {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: none;
      appearance: none;
    }

    .solo-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .solo-options[hidden] {
      display: none;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 16px 18px;
      min-height: 62px;
      font-size: 18px;
      font-weight: 800;
      color: #08111d;
      background: var(--accent);
    }

    button:disabled {
      opacity: 0.45;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
      font-size: 14px;
      color: var(--muted);
    }

    .question {
      font-size: 24px;
      line-height: 1.35;
      margin-top: 12px;
    }

    .answers {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .answer-btn {
      background: #214066;
      color: white;
      text-align: left;
      min-height: 84px;
      padding: 16px 18px;
      font-size: 18px;
      line-height: 1.35;
    }

    .answer-btn b {
      display: inline-block;
      width: 32px;
      color: var(--accent);
    }

    .answer-btn.correct {
      background: #1f8b58;
    }

    .answer-btn.wrong {
      background: #984450;
    }

    .answer-btn.selected {
      background: #8d6a12;
      outline: 2px solid rgba(255, 211, 79, 0.5);
    }

    .footer-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    .secondary {
      background: #304c72;
      color: white;
    }

    .explanation {
      margin-top: 16px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 15px;
    }

    .leaderboard {
      margin-top: 16px;
      display: grid;
      gap: 8px;
    }

    .leaderboard-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--ink);
      font-size: 15px;
    }

    .leaderboard-row.self {
      border: 1px solid rgba(255, 211, 79, 0.4);
      background: rgba(255, 211, 79, 0.08);
    }

    .results {
      margin-top: 16px;
      display: grid;
      gap: 8px;
    }

    .result-card {
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.4;
    }

    .result-card.correct {
      border-color: rgba(105, 230, 166, 0.35);
    }

    .result-card.wrong {
      border-color: rgba(255, 155, 125, 0.45);
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>LyHuor Learning</h1>
      <p id="leadText" class="lead">Join the TV room, then answer the live quiz from your phone.</p>
      <div class="room-form">
        <input id="playerNameInput" maxlength="24" placeholder="NAME" autocomplete="off">
        <input id="roomCodeInput" maxlength="6" placeholder="ROOM" autocomplete="off">
        <button id="joinButton">Join</button>
      </div>
      <div id="soloOptions" class="solo-options" hidden>
        <select id="soloCurriculum">
          <option value="cambodia_moeys">Cambodia MoEYS</option>
          <option value="international">International</option>
        </select>
        <select id="soloLanguage">
          <option value="khmer">Khmer</option>
          <option value="english">English</option>
          <option value="bilingual">Bilingual</option>
        </select>
        <select id="soloSubject">
          <option value="math">Math</option>
          <option value="english">English</option>
          <option value="general_science">General Science</option>
          <option value="biology">Biology</option>
          <option value="chemistry">Chemistry</option>
          <option value="physics">Physics</option>
        </select>
        <select id="soloGrade">
          <option value="2">Grade 2</option>
          <option value="3">Grade 3</option>
          <option value="4">Grade 4</option>
          <option value="5">Grade 5</option>
          <option value="6" selected>Grade 6</option>
          <option value="7">Grade 7</option>
          <option value="8">Grade 8</option>
          <option value="9">Grade 9</option>
          <option value="10">Grade 10</option>
          <option value="11">Grade 11</option>
          <option value="12">Grade 12</option>
        </select>
      </div>
      <div id="status" class="status" style="margin-top:12px;">Disconnected</div>
    </section>

    <section class="panel">
      <h2 id="brandTitle">Quiz Ready</h2>
      <div class="meta">
        <span id="questionMeta">Waiting for room</span>
        <span id="scoreMeta">Score 0</span>
      </div>
      <p id="questionText" class="question">Join a room to begin.</p>
      <div id="answers" class="answers"></div>
      <div id="hostActions" class="footer-actions" hidden>
        <button id="startButton" disabled>Start Quiz</button>
        <button id="nextButton" class="secondary" disabled>Next</button>
      </div>
      <div id="explanation" class="explanation"></div>
      <div id="results" class="results"></div>
      <div id="leaderboard" class="leaderboard"></div>
    </section>
  </main>

  <script src="./config.js"></script>
  <script>
    const config = window.FRUIT_CATCHER_CONFIG || {};
    const gatewayHttpUrl = config.gatewayHttpUrl || "http://localhost:3000";
    const gatewayWsUrl = config.gatewayWsUrl || "ws://localhost:3000";

    const playerNameInput = document.getElementById("playerNameInput");
    const roomCodeInput = document.getElementById("roomCodeInput");
    const joinButton = document.getElementById("joinButton");
    const statusEl = document.getElementById("status");
    const leadTextEl = document.getElementById("leadText");
    const brandTitleEl = document.getElementById("brandTitle");
    const questionMetaEl = document.getElementById("questionMeta");
    const scoreMetaEl = document.getElementById("scoreMeta");
    const questionTextEl = document.getElementById("questionText");
    const answersEl = document.getElementById("answers");
    const explanationEl = document.getElementById("explanation");
    const resultsEl = document.getElementById("results");
    const leaderboardEl = document.getElementById("leaderboard");
    const hostActionsEl = document.getElementById("hostActions");
    const startButton = document.getElementById("startButton");
    const nextButton = document.getElementById("nextButton");
    const soloOptionsEl = document.getElementById("soloOptions");
    const soloCurriculumEl = document.getElementById("soloCurriculum");
    const soloLanguageEl = document.getElementById("soloLanguage");
    const soloSubjectEl = document.getElementById("soloSubject");
    const soloGradeEl = document.getElementById("soloGrade");
    const sessionStorageKey = "fruitcatcher-controller-session-v2";

    const params = new URLSearchParams(window.location.search);
    const isSoloMode = (params.get("mode") || "").toLowerCase() === "solo";
    const prefilledRoomCode = (params.get("roomCode") || "").toUpperCase();

    let ws;
    let joinedRoomCode = "";
    let latestState = null;
    let joinedPlayerId = "";
    let joinInFlight = false;
    let reconnectTimer = null;
    let soloSessionId = "";

    function makeClientId() {
      return `C${Math.random().toString(36).slice(2, 12)}${Date.now().toString(36)}`.toUpperCase();
    }

    function loadSavedSession() {
      try {
        const raw = window.localStorage.getItem(sessionStorageKey);
        if (!raw) {
          return { clientId: makeClientId(), playerName: "", roomCode: "" };
        }

        const parsed = JSON.parse(raw);
        return {
          clientId: parsed.clientId || makeClientId(),
          playerName: parsed.playerName || "",
          roomCode: parsed.roomCode || ""
        };
      } catch (error) {
        return { clientId: makeClientId(), playerName: "", roomCode: "" };
      }
    }

    const savedSession = loadSavedSession();

    function saveSession(patch) {
      Object.assign(savedSession, patch);
      window.localStorage.setItem(sessionStorageKey, JSON.stringify(savedSession));
    }

    if (savedSession.playerName) {
      playerNameInput.value = savedSession.playerName;
    }
    roomCodeInput.value = prefilledRoomCode || savedSession.roomCode || "";
    if (isSoloMode) {
      playerNameInput.value = params.get("name") || savedSession.playerName || "";
      roomCodeInput.value = "";
      roomCodeInput.hidden = true;
      roomCodeInput.required = false;
      soloOptionsEl.hidden = false;
      joinButton.textContent = "Start";
      soloCurriculumEl.value = params.get("curriculum") || "cambodia_moeys";
      soloLanguageEl.value = params.get("language") || "khmer";
      soloSubjectEl.value = params.get("subject") || "math";
      soloGradeEl.value = params.get("grade") || "6";
    }

    function getCurriculumLabel(value) {
      return value === "cambodia_moeys" ? "Cambodia MoEYS" : "International";
    }

    function getLanguageLabel(value) {
      if (value === "khmer") return "Khmer";
      if (value === "bilingual") return "Bilingual";
      return "English";
    }

    function getDifficultyLabel(value) {
      if (value === "challenge") return "Challenge";
      if (value === "easy") return "Easy";
      return "Standard";
    }

    function getSubjectLabel(value) {
      if (value === "general_science") return "General Science";
      if (value === "biology") return "Biology";
      if (value === "chemistry") return "Chemistry";
      if (value === "physics") return "Physics";
      if (value === "math") return "Math";
      if (value === "english") return "English";
      return value;
    }

    function normalizeRoomCode(value) {
      return value.replace(/[^a-z0-9]/gi, "").toUpperCase().slice(0, 6);
    }

    function normalizePlayerName(value) {
      return value.replace(/\s+/g, " ").trim().slice(0, 24);
    }

    function setStatus(text, color) {
      statusEl.textContent = text;
      statusEl.style.color = color || "#9fb2c9";
    }

    function setJoinFormLocked(locked) {
      playerNameInput.disabled = locked;
      roomCodeInput.disabled = locked;
      soloCurriculumEl.disabled = locked;
      soloLanguageEl.disabled = locked;
      soloSubjectEl.disabled = locked;
      soloGradeEl.disabled = locked;
    }

    function send(payload) {
      if (isSoloMode) {
        handleSoloControl(payload);
        return;
      }

      if (!ws || ws.readyState !== WebSocket.OPEN || !joinedRoomCode) {
        return;
      }

      ws.send(JSON.stringify({
        ...payload,
        roomCode: joinedRoomCode
      }));
    }

    function updateButtons() {
      const status = latestState?.status || "LOBBY";
      if (isSoloMode) {
        hostActionsEl.hidden = !soloSessionId;
        startButton.hidden = true;
        nextButton.textContent = status === "FINISHED" ? "New Quiz" : "Next";
        nextButton.disabled = !soloSessionId || !["READY", "REVIEWING", "FINISHED"].includes(status);
        joinButton.textContent = soloSessionId ? "Change Quiz" : (joinInFlight ? "Starting..." : "Start");
        joinButton.disabled = joinInFlight;
        setJoinFormLocked(Boolean(soloSessionId) && status !== "FINISHED");
        return;
      }

      const canHostAdvance = joinedRoomCode && !joinedPlayerId && (status === "LOBBY" || status === "FINISHED");
      hostActionsEl.hidden = true;
      startButton.disabled = !canHostAdvance;
      nextButton.disabled = true;
      joinButton.disabled = joinInFlight || Boolean(joinedRoomCode);
      setJoinFormLocked(Boolean(joinedRoomCode));
    }

    function attemptJoin(roomCode, playerName) {
      if (isSoloMode) {
        startSoloQuiz(playerName);
        return true;
      }

      if (!ws || ws.readyState !== WebSocket.OPEN || joinInFlight || joinedRoomCode) {
        return false;
      }

      const normalizedRoomCode = normalizeRoomCode(roomCode);
      const normalizedPlayerName = normalizePlayerName(playerName);

      if (!normalizedRoomCode) {
        setStatus("Enter a valid room code.", "#ff9b7d");
        return false;
      }

      roomCodeInput.value = normalizedRoomCode;
      playerNameInput.value = normalizedPlayerName;
      saveSession({
        playerName: normalizedPlayerName,
        roomCode: normalizedRoomCode
      });

      joinInFlight = true;
      joinButton.textContent = "Joining...";
      updateButtons();
      ws.send(JSON.stringify({
        type: "join_room",
        roomCode: normalizedRoomCode,
        playerName: normalizedPlayerName,
        clientId: savedSession.clientId
      }));
      return true;
    }

    async function soloRequest(path, options = {}) {
      const response = await fetch(`${gatewayHttpUrl}${path}`, {
        method: options.method || "GET",
        headers: {
          "Content-Type": "application/json"
        },
        body: options.body ? JSON.stringify(options.body) : undefined
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || `Request failed: ${response.status}`);
      }
      return data;
    }

    async function startSoloQuiz(playerName) {
      if (joinInFlight || soloSessionId) {
        return;
      }

      const normalizedPlayerName = normalizePlayerName(playerName);
      playerNameInput.value = normalizedPlayerName;
      saveSession({ playerName: normalizedPlayerName, roomCode: "" });
      joinInFlight = true;
      joinButton.textContent = "Starting...";
      setStatus("Creating your quiz...", "#ffd166");
      updateButtons();

      try {
        const createResult = await soloRequest("/solo/sessions", {
          method: "POST",
          body: {
            studentName: normalizedPlayerName || "Student",
            clientId: savedSession.clientId,
            source: params.get("source") || "web",
            sourceUserId: params.get("sourceUserId") || params.get("uid") || "",
            curriculum: soloCurriculumEl.value,
            language: soloLanguageEl.value,
            subject: soloSubjectEl.value,
            gradeLevel: Number(soloGradeEl.value),
            questionSource: params.get("questionSource") || "question_bank_openai",
            questionsPerRound: Number(params.get("count") || 10)
          }
        });
        soloSessionId = createResult.sessionId;
        joinedRoomCode = "SOLO";
        joinedPlayerId = soloSessionId;
        latestState = createResult.state;
        setStatus("Solo quiz ready.", "#69e6a6");
        await loadSoloNext();
      } catch (error) {
        soloSessionId = "";
        joinedRoomCode = "";
        joinedPlayerId = "";
        latestState = null;
        setStatus(error.message || "Could not start quiz.", "#ff9b7d");
        renderState();
      } finally {
        joinInFlight = false;
        updateButtons();
      }
    }

    async function loadSoloNext() {
      if (!soloSessionId) {
        return;
      }

      if (latestState?.status === "FINISHED") {
        resetSoloQuiz();
        return;
      }

      setStatus("Loading question...", "#ffd166");
      latestState = {
        ...(latestState || {}),
        status: "LOADING"
      };
      renderState();

      try {
        const data = await soloRequest(`/solo/sessions/${encodeURIComponent(soloSessionId)}/next`, {
          method: "POST",
          body: {}
        });
        latestState = data.state;
        setStatus(latestState.status === "FINISHED" ? "Quiz complete." : "Question ready.", "#69e6a6");
        renderState();
      } catch (error) {
        setStatus(error.message || "Could not load question.", "#ff9b7d");
        renderState();
      }
    }

    async function submitSoloAnswer(choice) {
      if (!soloSessionId || latestState?.status !== "ANSWERING") {
        return;
      }

      latestState = {
        ...latestState,
        selectedChoice: choice,
        player: {
          ...(latestState.player || {}),
          answered: true
        }
      };
      renderState();

      try {
        const data = await soloRequest(`/solo/sessions/${encodeURIComponent(soloSessionId)}/answer`, {
          method: "POST",
          body: { choice }
        });
        latestState = data.state;
        setStatus(data.result?.isCorrect ? "Correct. Review the explanation." : "Review the explanation.", data.result?.isCorrect ? "#69e6a6" : "#ff9b7d");
        renderState();
      } catch (error) {
        setStatus(error.message || "Could not submit answer.", "#ff9b7d");
        renderState();
      }
    }

    function handleSoloControl(payload) {
      if (payload?.action === "answer") {
        submitSoloAnswer(payload.choice);
      } else if (payload?.action === "next" || payload?.action === "start") {
        loadSoloNext();
      }
    }

    function resetSoloQuiz() {
      soloSessionId = "";
      joinedRoomCode = "";
      joinedPlayerId = "";
      latestState = null;
      setStatus("Choose a quiz and press Start.", "#69e6a6");
      renderState();
    }

    function renderLeaderboard() {
      leaderboardEl.innerHTML = "";
      const leaderboard = latestState?.leaderboard || [];

      if (!leaderboard.length) {
        return;
      }

      for (const player of leaderboard.slice(0, 8)) {
        const row = document.createElement("div");
        row.className = "leaderboard-row";
        if (player.playerId === joinedPlayerId) {
          row.classList.add("self");
        }

        const nameEl = document.createElement("span");
        const scoreEl = document.createElement("span");
        nameEl.textContent = player.name;
        scoreEl.textContent = String(player.score);
        row.append(nameEl, scoreEl);
        leaderboardEl.appendChild(row);
      }
    }

    function renderResults() {
      resultsEl.innerHTML = "";
      const results = latestState?.player?.results || [];
      if (!results.length) {
        return;
      }

      const title = document.createElement("div");
      title.className = "status";
      title.textContent = "Your recent answers";
      resultsEl.appendChild(title);

      for (const result of results.slice(-5).reverse()) {
        const card = document.createElement("div");
        card.className = `result-card ${result.isCorrect ? "correct" : "wrong"}`;
        const answer = result.choice || "No answer";
        card.innerHTML =
          `<b>Q${Number(result.questionIndex || 0) + 1}: ${result.isCorrect ? "Correct" : "Review"}</b><br>` +
          `Your answer: ${answer} | Correct: ${result.correctChoice}<br>` +
          `<span>${formatMathHTML(result.shortExplanation || result.elaboration || "")}</span>`;
        resultsEl.appendChild(card);
      }
    }

    function formatMathHTML(text) {
      if (!text) return "";
      return String(text)
        // Superscripts (exponents) - handle single chars and bracketed expressions
        .replace(/\^(\d+)/g, '<sup>$1</sup>')
        .replace(/\^([a-zA-Z])/g, '<sup>$1</sup>')
        .replace(/\^\{([^}]+)\}/g, '<sup>$1</sup>')
        .replace(/\^\(([^)]+)\)/g, '<sup>$1</sup>')
        // Subscripts - handle single chars and bracketed expressions
        .replace(/\_(\d+)/g, '<sub>$1</sub>')
        .replace(/\_([a-zA-Z])/g, '<sub>$1</sub>')
        .replace(/\_\{([^}]+)\}/g, '<sub>$1</sub>')
        .replace(/\_\(([^)]+)\)/g, '<sub>$1</sub>')
        // Comparison operators
        .replace(/<=/g, '≤')
        .replace(/>=/g, '≥')
        .replace(/!=/g, '≠')
        .replace(/==/g, '=')
        // Mathematical operators and symbols
        .replace(/\+\/-/g, '±')
        .replace(/\+-/g, '±')
        .replace(/\*\*/g, '×')
        .replace(/\s+x\s+/gi, ' × ')
        .replace(/\s+÷\s+/g, ' ÷ ')
        .replace(/sqrt\(/gi, '√(')
        .replace(/\bsqrt\b/gi, '√')
        // Fractions (simple a/b format) - wrap in span for better styling
        .replace(/(\d+)\/(\d+)/g, '<sup>$1</sup>⁄<sub>$2</sub>')
        // Greek letters (common in math)
        .replace(/\bpi\b/gi, 'π')
        .replace(/\btheta\b/gi, 'θ')
        .replace(/\balpha\b/gi, 'α')
        .replace(/\bbeta\b/gi, 'β')
        .replace(/\bgamma\b/gi, 'γ')
        .replace(/\bdelta\b/gi, 'δ')
        .replace(/\bDelta\b/g, 'Δ')
        .replace(/\bsigma\b/gi, 'σ')
        .replace(/\blambda\b/gi, 'λ')
        .replace(/\bmu\b/gi, 'μ')
        .replace(/\bepsilon\b/gi, 'ε')
        .replace(/\bomega\b/gi, 'ω')
        .replace(/\bOmega\b/g, 'Ω')
        .replace(/\bphi\b/gi, 'φ')
        // Special symbols
        .replace(/\bdegrees?\b/gi, '°')
        .replace(/\binf(?:inity)?\b/gi, '∞')
        .replace(/\bapprox\b/gi, '≈')
        .replace(/\bneq\b/gi, '≠')
        .replace(/\bleq\b/gi, '≤')
        .replace(/\bgeq\b/gi, '≥')
        .replace(/\btimes\b/gi, '×')
        // Clean up any double spaces
        .replace(/\s{2,}/g, ' ');
    }

    function renderAnswers() {
      answersEl.innerHTML = "";
      const question = latestState?.question;
      if (!question) {
        return;
      }

      for (const choice of question.choices) {
        const button = document.createElement("button");
        button.className = "answer-btn";
        button.disabled = latestState.status !== "ANSWERING" || Boolean(latestState.player?.answered);
        const label = document.createElement("b");
        label.textContent = choice.id;
        const textSpan = document.createElement("span");
        textSpan.innerHTML = formatMathHTML(choice.text);
        button.append(label, textSpan);

        if (latestState.status === "REVIEWING") {
          if (choice.id === latestState.correctChoice) {
            button.classList.add("correct");
          } else if (choice.id === latestState.selectedChoice) {
            button.classList.add("wrong");
          }
        } else if (choice.id === latestState.selectedChoice) {
          button.classList.add("selected");
        }

        button.addEventListener("click", () => {
          send({
            type: "control",
            action: "answer",
            choice: choice.id
          });
        });
        answersEl.appendChild(button);
      }
    }

    function renderState() {
      if (!latestState) {
        leadTextEl.textContent = isSoloMode
          ? "Choose your quiz, then answer from your phone."
          : "Join the TV room, then answer the live quiz from your phone.";
        questionMetaEl.textContent = isSoloMode ? "Solo quiz" : "Waiting for room";
        scoreMetaEl.textContent = "Score 0";
        questionTextEl.textContent = isSoloMode ? "Enter your name and press Start." : "Join a room to begin.";
        explanationEl.textContent = "";
        answersEl.innerHTML = "";
        leaderboardEl.innerHTML = "";
        resultsEl.innerHTML = "";
        joinButton.textContent = isSoloMode ? "Start" : "Join";
        updateButtons();
        return;
      }

      brandTitleEl.textContent = latestState.config.brandTitle;
      leadTextEl.textContent =
        `${getCurriculumLabel(latestState.config.curriculum)} | ` +
        `${getLanguageLabel(latestState.config.language)} | ` +
        `${getDifficultyLabel(latestState.config.difficultyMode)}`;
      questionMetaEl.textContent =
        `Question ${Math.min(latestState.questionIndex + 1, latestState.questionsPerRound)} / ${latestState.questionsPerRound} | ` +
        `${getSubjectLabel(latestState.config.subject)} | Grade ${latestState.config.gradeLevel || 6}`;
      scoreMetaEl.textContent = latestState.player
        ? `${latestState.player.name}: ${latestState.player.score}`
        : `Players ${latestState.playerCount || 0}`;
      if (!isSoloMode) {
        joinButton.textContent = joinedRoomCode ? "Joined" : "Join";
      }

      if (latestState.status === "LOADING") {
        questionTextEl.textContent = "Loading next question...";
        explanationEl.textContent = "";
        answersEl.innerHTML = "";
      } else if (latestState.question) {
        questionTextEl.innerHTML = formatMathHTML(latestState.question.prompt);
        explanationEl.innerHTML = latestState.status === "REVIEWING"
          ? formatMathHTML(`${latestState.shortExplanation} ${latestState.elaboration}`)
          : latestState.player?.answered
            ? "Answer sent. Waiting for other students or the timer."
            : `Players answered: ${latestState.answerCount || 0}/${latestState.connectedPlayerCount || latestState.playerCount || 0}`;
        renderAnswers();
      } else if (latestState.status === "FINISHED") {
        questionTextEl.textContent = isSoloMode
          ? `Quiz complete. Your score: ${latestState.player?.score || latestState.score || 0}/${latestState.questionsPerRound}`
          : `Round complete. Correct answers this round: ${latestState.score}`;
        explanationEl.textContent = isSoloMode
          ? "Review your recent answers below, or press New Quiz to start again."
          : "Press Start Quiz to generate a fresh set of questions.";
        answersEl.innerHTML = "";
      } else {
        questionTextEl.textContent = isSoloMode ? "Press Next to continue." : "Press Start Quiz when the TV is ready.";
        explanationEl.textContent = "";
        answersEl.innerHTML = "";
      }

      renderLeaderboard();
      renderResults();
      updateButtons();
    }

    function connect() {
      ws = new WebSocket(gatewayWsUrl);
      setStatus("Connecting...", "#ffd166");

      ws.addEventListener("open", () => {
        setStatus("Connected. Enter a room code.", "#69e6a6");
        if (savedSession.roomCode) {
          attemptJoin(savedSession.roomCode, savedSession.playerName || playerNameInput.value);
        }
      });

      ws.addEventListener("message", (event) => {
        const data = JSON.parse(event.data);

        if (data.type === "joined_room") {
          joinInFlight = false;
          joinedRoomCode = data.roomCode;
          joinedPlayerId = data.playerId || "";
          if (data.playerName) {
            playerNameInput.value = data.playerName;
          }
          saveSession({
            playerName: data.playerName || playerNameInput.value,
            roomCode: data.roomCode
          });
          latestState = data.state || latestState;
          setStatus(`Joined room ${data.roomCode} as ${data.playerName || "student"}`, "#69e6a6");
          renderState();
          return;
        }

        if (data.type === "room_state") {
          latestState = data.state;
          renderState();
          return;
        }

        if (data.type === "join_error") {
          joinInFlight = false;
          joinedRoomCode = "";
          joinedPlayerId = "";
          latestState = null;
          setStatus(data.message, "#ff9b7d");
          renderState();
          return;
        }

        if (data.type === "room_closed") {
          joinInFlight = false;
          joinedRoomCode = "";
          joinedPlayerId = "";
          latestState = null;
          saveSession({ roomCode: "" });
          setStatus("TV disconnected. Rejoin with a new room code.", "#ff9b7d");
          renderState();
        }
      });

      ws.addEventListener("close", () => {
        joinInFlight = false;
        joinedRoomCode = "";
        joinedPlayerId = "";
        latestState = null;
        setStatus("Connection lost. Reconnecting...", "#ffd166");
        renderState();
        window.clearTimeout(reconnectTimer);
        reconnectTimer = window.setTimeout(connect, 2000);
      });

      ws.addEventListener("error", () => {
        setStatus("WebSocket error", "#ff9b7d");
      });
    }

    roomCodeInput.addEventListener("input", () => {
      roomCodeInput.value = normalizeRoomCode(roomCodeInput.value);
    });

    playerNameInput.addEventListener("input", () => {
      playerNameInput.value = playerNameInput.value.slice(0, 24);
    });

    joinButton.addEventListener("click", () => {
      if (isSoloMode) {
        if (soloSessionId) {
          resetSoloQuiz();
          return;
        }
        attemptJoin("", playerNameInput.value);
        return;
      }

      if (!ws || ws.readyState !== WebSocket.OPEN) {
        setStatus("Gateway is not connected yet.", "#ff9b7d");
        return;
      }

      if (joinedRoomCode) {
        setStatus(`Already joined room ${joinedRoomCode}.`, "#69e6a6");
        return;
      }

      attemptJoin(roomCodeInput.value, playerNameInput.value);
    });

    startButton.addEventListener("click", () => {
      send({
        type: "control",
        action: "start"
      });
    });

    nextButton.addEventListener("click", () => {
      send({
        type: "control",
        action: "next"
      });
    });

    renderState();
    if (isSoloMode) {
      setStatus("Ready for solo quiz.", "#69e6a6");
    } else {
      connect();
    }
  </script>
</body>
</html>
